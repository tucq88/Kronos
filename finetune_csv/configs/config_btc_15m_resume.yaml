data:
  data_path: "/workspace/Kronos/finetune_csv/data/btc_15m.csv"
  lookback_window: 512
  predict_window: 48
  max_context: 512
  clip: 5.0
  train_ratio: 0.9
  val_ratio: 0.1
  test_ratio: 0.0

training:
  tokenizer_epochs: 30
  basemodel_epochs: 17        # remaining epochs (20 - 3 completed)
  batch_size: 16
  log_interval: 50
  num_workers: 2
  seed: 42

  tokenizer_learning_rate: 0.0002
  predictor_learning_rate: 0.000001

  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: 0.1

  accumulation_steps: 2

model_paths:
  pretrained_tokenizer: "/workspace/Kronos/finetune_csv/finetuned/btc_15m/tokenizer/best_model"
  pretrained_predictor: "/workspace/Kronos/finetune_csv/finetuned/btc_15m/basemodel/best_model"

  exp_name: "btc_15m"
  base_path: "/workspace/Kronos/finetune_csv/finetuned/"
  base_save_path: "/workspace/Kronos/finetune_csv/finetuned/btc_15m"
  finetuned_tokenizer: "/workspace/Kronos/finetune_csv/finetuned/btc_15m/tokenizer/best_model"

  tokenizer_save_name: "tokenizer"
  basemodel_save_name: "basemodel"

experiment:
  name: "kronos_btc_15m_resume"
  description: "Resume basemodel from epoch 3/20"
  use_comet: false
  train_tokenizer: false      # already done
  train_basemodel: true
  skip_existing: false

device:
  use_cuda: true
  device_id: 0
