data:
  data_path: "finetune_csv/data/btc_15m.csv"
  lookback_window: 512
  predict_window: 48        # 48 × 15min = 12 hours ahead
  max_context: 512
  clip: 5.0
  train_ratio: 0.9
  val_ratio: 0.1
  test_ratio: 0.0

training:
  tokenizer_epochs: 30
  basemodel_epochs: 20
  batch_size: 16            # lower than default — safe for CPU/low-RAM machines
  log_interval: 50
  num_workers: 2
  seed: 42

  tokenizer_learning_rate: 0.0002
  predictor_learning_rate: 0.000001

  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_weight_decay: 0.1

  accumulation_steps: 2     # compensates for smaller batch size

model_paths:
  pretrained_tokenizer: "NeoQuasar/Kronos-Tokenizer-base"
  pretrained_predictor: "NeoQuasar/Kronos-small"

  exp_name: "btc_15m"
  base_path: "finetune_csv/finetuned/"
  base_save_path: ""
  finetuned_tokenizer: ""

  tokenizer_save_name: "tokenizer"
  basemodel_save_name: "basemodel"

experiment:
  name: "kronos_btc_15m"
  description: "Fine-tune Kronos-small on BTCUSDT 15m data"
  use_comet: false
  train_tokenizer: true
  train_basemodel: true
  skip_existing: false

device:
  use_cuda: true
  device_id: 0
